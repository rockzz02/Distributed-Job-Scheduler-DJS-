server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: distributed-job-scheduler

  datasource:
    url: ${DJS_DATABASE_URL:jdbc:postgresql://localhost:5432/djs}
    username: ${DJS_DATABASE_USERNAME:djs}
    password: ${DJS_DATABASE_PASSWORD:djs}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: djs-postgres-pool
      maximum-pool-size: ${DJS_DATABASE_MAX_POOL_SIZE:10}
      minimum-idle: ${DJS_DATABASE_MIN_IDLE:2}
      connection-timeout: 30000
      validation-timeout: 5000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  rabbitmq:
    host: ${DJS_RABBITMQ_HOST:localhost}
    port: ${DJS_RABBITMQ_PORT:5672}
    username: ${DJS_RABBITMQ_USERNAME:djs}
    password: ${DJS_RABBITMQ_PASSWORD:djs}
    virtual-host: ${DJS_RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${DJS_RABBITMQ_PREFETCH:10}
        default-requeue-rejected: false

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.djs: ${DJS_LOG_LEVEL:INFO}
    org.springframework.amqp: WARN
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [requestId:%X{requestId:-} traceId:%X{traceId:-}]"

djs:
  scheduler:
    enabled: ${DJS_SCHEDULER_ENABLED:true}
    poll-interval: ${DJS_SCHEDULER_POLL_INTERVAL:10s}
    batch-size: ${DJS_SCHEDULER_BATCH_SIZE:100}

  worker:
    enabled: ${DJS_WORKER_ENABLED:true}
    id: ${DJS_WORKER_ID:${HOSTNAME:local-worker}}
    concurrency: ${DJS_WORKER_CONCURRENCY:4}

  rabbitmq:
    job-exchange: ${DJS_JOB_EXCHANGE:djs.job.exchange}
    job-queue: ${DJS_JOB_QUEUE:djs.job.queue}
    job-routing-key: ${DJS_JOB_ROUTING_KEY:djs.job.routing-key}
    dead-letter-exchange: ${DJS_DEAD_LETTER_EXCHANGE:djs.job.dlx}
    dead-letter-queue: ${DJS_DEAD_LETTER_QUEUE:djs.job.dlq}
    dead-letter-routing-key: ${DJS_DEAD_LETTER_ROUTING_KEY:djs.job.dead-letter}
